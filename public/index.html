<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HATchat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container" class="card">
        <h2>Вход в HATchat</h2>
        <input type="text" id="username-input" placeholder="Ваше имя..." required>
        <input type="text" id="room-input" placeholder="Название комнаты..." required>
        <button id="join-btn">Войти</button>
    </div>

    <div id="chat-container" class="card hidden">
        <div class="chat-header">
            <h3 id="room-title">Комната: -</h3>
            <button id="leave-btn">Выйти</button>
        </div>
        
        <div class="chat-main">
            <div class="sidebar">
                <h4>Онлайн (<span id="user-count">0</span>)</h4>
                <ul id="users-list"></ul>
            </div>

            <div class="chat-area">
                <div id="messages-box"></div>
                <div id="typing-indicator"></div>
                
                <form id="message-form">
                    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off" required>
                    <button type="submit">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
